name: CI

# Pipeline: run tests -> build images -> push to ECR -> deploy to ECS + EKS.
#
# Images are only pushed (and deployed) on pushes to the default branch
# and manual runs. Pull requests run tests and build-only validation.
# ECS and EKS deployments run in parallel after images are pushed.
#
# Required configuration (Settings -> Secrets and variables -> Actions):
#   secret  AWS_ROLE_ARN      ARN of the IAM role trusted by GitHub OIDC.
#   var     AWS_REGION        ECR/ECS/EKS region (optional, defaults to eu-west-1).
#   var     ECS_CLUSTER_NAME  ECS cluster name — from: terraform output ecs_cluster_name
#   var     EKS_CLUSTER_NAME  EKS cluster name — from: terraform output eks_cluster_name
#   var     DB_SECRET_ARN     RDS Secrets Manager ARN — from: terraform output db_secret_arn
#   var     DB_HOST           RDS endpoint host — from: terraform output rds_endpoint
#   var     DB_NAME           Database name (e.g. orchestrator)
#   var     DB_USER           Database master username (e.g. shopnow)
#   var     DB_PORT           DB port (optional, defaults to 5432)
#
# The DB password is NOT read by this pipeline — the External Secrets Operator
# syncs it from Secrets Manager into the cluster (see helm/shopnow). CI only
# passes the non-secret connection params and the secret's ARN.
#
# ECR repositories (created by infra/ Terraform): shopnow-backend, shopnow-frontend.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write   # propagated to the reusable build workflow for OIDC
  contents: read

jobs:
  test-backend:
    name: Test backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # SQLite keeps import-time engine creation happy without a real DB;
      # the smoke tests never touch it.
      DATABASE_URL: sqlite://
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run tests
        run: uv run --group dev pytest -q

  test-frontend:
    name: Test frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

  build-backend:
    name: Build backend image
    needs: [test-backend, test-frontend]
    uses: ./.github/workflows/build-and-push.yaml
    with:
      service: backend
      context: backend
      ecr_repository: shopnow-backend
      aws_region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      push: ${{ github.event_name != 'pull_request' }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  build-frontend:
    name: Build frontend image
    needs: [test-backend, test-frontend]
    uses: ./.github/workflows/build-and-push.yaml
    with:
      service: frontend
      context: frontend
      ecr_repository: shopnow-frontend
      aws_region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      push: ${{ github.event_name != 'pull_request' }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  deploy-ecs:
    name: Deploy to ECS
    needs: [build-backend, build-frontend]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      - name: Force new deployment (frontend)
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER_NAME }}" \
            --service frontend \
            --force-new-deployment \
            --no-cli-pager

      - name: Force new deployment (backend)
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER_NAME }}" \
            --service backend \
            --force-new-deployment \
            --no-cli-pager

      - name: Wait for services to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER_NAME }}" \
            --services frontend backend

  deploy-eks:
    name: Deploy to EKS
    needs: [build-backend, build-frontend]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.16.0"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "${{ vars.EKS_CLUSTER_NAME }}" \
            --region "${{ vars.AWS_REGION || 'eu-west-1' }}"

      - name: Deploy via Helm
        run: |
          IMAGE_TAG="sha-${{ github.sha }}"
          REGISTRY="${{ steps.ecr.outputs.registry }}"

          # Recover from a release left in a pending-* state by a previous run
          # that was killed/cancelled mid-deploy (Helm otherwise refuses with
          # "another operation in progress"). Roll back to the last good
          # revision if there is one; if the very first install never completed,
          # there is nothing to roll back to, so uninstall and let this run
          # reinstall cleanly.
          STATUS=$(helm status shopnow -n shopnow -o json 2>/dev/null | jq -r '.info.status' || true)
          case "$STATUS" in
            pending-*)
              echo "Found stuck release in '$STATUS'; clearing before deploy."
              helm rollback shopnow -n shopnow || helm uninstall shopnow -n shopnow
              ;;
          esac

          # The DB password is synced into the cluster by the External Secrets
          # Operator (ExternalSecret in the chart); CI only supplies non-secret
          # connection params and the secret's ARN.
          helm upgrade --install shopnow ./helm/shopnow \
            --namespace shopnow --create-namespace \
            --set "image.backend.repository=${REGISTRY}/shopnow-backend" \
            --set "image.backend.tag=${IMAGE_TAG}" \
            --set "image.frontend.repository=${REGISTRY}/shopnow-frontend" \
            --set "image.frontend.tag=${IMAGE_TAG}" \
            --set "database.host=${{ vars.DB_HOST }}" \
            --set "database.port=${{ vars.DB_PORT || '5432' }}" \
            --set "database.name=${{ vars.DB_NAME }}" \
            --set "database.user=${{ vars.DB_USER }}" \
            --set "externalSecrets.region=${{ vars.AWS_REGION || 'eu-west-1' }}" \
            --set "externalSecrets.dbSecretArn=${{ vars.DB_SECRET_ARN }}" \
            --wait --timeout 5m
