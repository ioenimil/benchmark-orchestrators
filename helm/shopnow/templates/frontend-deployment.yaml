apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.image.frontend.repository }}:{{ .Values.image.frontend.tag }}"
          ports:
            - containerPort: 80
          env:
            # Tells the nginx entrypoint to export NGINX_LOCAL_RESOLVERS from the
            # pod's /etc/resolv.conf (kube-dns), which the config template uses in
            # its `resolver` directive to resolve the in-cluster backend Service.
            - name: NGINX_ENTRYPOINT_LOCAL_RESOLVERS
              value: "1"
          envFrom:
            - configMapRef:
                name: shopnow-config
            - secretRef:
                name: shopnow-secret
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
