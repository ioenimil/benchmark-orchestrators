# Syncs the DB password from AWS Secrets Manager into the shopnow-secret
# Kubernetes Secret. The External Secrets Operator (installed cluster-wide by
# Terraform) reconciles this using its controller IRSA role, so the CI pipeline
# never reads the secret. ESO re-reads on refreshInterval, picking up RDS
# password rotations; Reloader then restarts the backend (see its Deployment
# annotation) so the new value reaches running pods.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: {{ .Release.Namespace }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ required "externalSecrets.region is required" .Values.externalSecrets.region | quote }}
      # No auth block: ESO uses the controller ServiceAccount's IRSA identity.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: shopnow-db
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    # Produces the same Secret the backend already consumes via secretRef.
    name: shopnow-secret
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        # ARN of the RDS-managed master secret; "password" is one of its JSON keys.
        key: {{ required "externalSecrets.dbSecretArn is required" .Values.externalSecrets.dbSecretArn | quote }}
        property: password
