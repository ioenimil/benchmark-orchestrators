apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: shopnow-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: shopnow-gateway
  rules:
    # Everything goes to the frontend (nginx). nginx serves the SPA and proxies
    # /api/* to the backend Service internally.
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
