# Namespace is set via `helm install --namespace shopnow --create-namespace`,
# not here, so the chart can be installed under any release namespace.

image:
  backend:
    repository: "" # ECR repo URL, e.g. <account>.dkr.ecr.<region>.amazonaws.com/shopnow-backend
    tag: latest
  frontend:
    repository: "" # ECR repo URL, e.g. <account>.dkr.ecr.<region>.amazonaws.com/shopnow-frontend
    tag: latest

backend:
  replicas: 2

frontend:
  replicas: 2

redis:
  replicas: 1
  image: redis:7-alpine

# CoreDNS resolves these to the in-cluster ClusterIP Services.
config:
  backendHost: backend
  backendPort: "8000"
  redisHost: redis
  redisPort: "6379"

# Non-secret DB connection params (set via pipeline). The RDS-managed secret
# only holds username/password, so host/port/name/user come from config, not ESO.
database:
  host: ""     # RDS endpoint — set via pipeline from terraform output rds_endpoint
  port: "5432"
  name: ""     # e.g. orchestrator
  user: ""     # e.g. shopnow

# The DB password is synced from AWS Secrets Manager by the External Secrets
# Operator into shopnow-secret — never passed through the pipeline.
externalSecrets:
  region: ""        # AWS region of the secret, set via pipeline (e.g. eu-west-1)
  dbSecretArn: ""   # ARN of the RDS-managed master secret (terraform output db_secret_arn)
  refreshInterval: 1h  # how often ESO re-reads the secret (picks up rotation)

gateway:
  className: shopnow-alb
  # internet-facing (default would be "internal").
  scheme: internet-facing
